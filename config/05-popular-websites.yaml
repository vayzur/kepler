# High-traffic public websites.
popular-defaults: &popular_defaults
  group: "Popular Websites"
  interval: 60s
  client:
    timeout: 10s
  headers:
    User-Agent: "connectivity-monitor/1.0"
    Accept: "*/*"
  conditions:
    - "[STATUS] >= 200"
    - "[STATUS] < 400"

endpoints:
  - name: google
    <<: *popular_defaults
    url: https://www.google.com/

  - name: wikipedia
    <<: *popular_defaults
    url: https://www.wikipedia.org/
